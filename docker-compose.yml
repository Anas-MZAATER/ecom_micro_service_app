networks:
  ecom-microservices:
    driver: bridge

volumes:
  consul-data:
  vault-data:
  vault-logs:


services:
  ecom-consul:
    image: hashicorp/consul:1.22
    container_name: ecom-consul-server
    networks:
      - ecom-microservices
    ports:
      - "8500:8500"  # UI & HTTP API
      - "8600:8600/udp"  # DNS
    volumes:
      - consul-data:/consul/data
      - ./consul/config:/consul/config
    command: >
      agent -server -ui
      -bootstrap-expect=1
      -client=0.0.0.0
      -bind=0.0.0.0
      -data-dir=/consul/data
    environment:
      - CONSUL_BIND_INTERFACE=eth0
    healthcheck:
      #test: ["CMD", "consul", "members"]
      test: ["CMD", "wget", "--spider", "-q", "http://ecom-consul:8500/v1/agent/self"]
      interval: 10s
      timeout: 3s
      retries: 3

  ecom-vault:
    image: hashicorp/vault:1.12.3
    container_name: ecom-vault-server
    env_file:
      - .env.docker
    networks:
      - ecom-microservices
    ports:
      - "8200:8200"
    volumes:
      - vault-data:/vault/data
      - vault-logs:/vault/logs
      - ./vault/config:/vault/config
    command: server -dev
    cap_add:
      - IPC_LOCK
    healthcheck:
      #test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
      test: ["CMD", "wget", "--spider", "-q", "http://ecom-vault:8200/v1/sys/health"]
      interval: 10s
      retries: 5
    depends_on:
      ecom-consul:
        condition: service_healthy

  ecom-config-service:
    build: ./config-service
    container_name: ecom-config-service
    env_file:
      - .env.docker
    networks:
      - ecom-microservices
    ports:
      - '9999:9999'
    expose:
      - '9999'
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9999/actuator/health"]
      interval: 5s
      retries: 5
    depends_on:
      ecom-consul:
        condition: service_healthy

  ecom-customer-service:
    build: ./customer-service
    container_name: ecom-customer-service
    env_file:
      - .env.docker
    networks:
      - ecom-microservices
    ports:
      - "8081:8081"
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/actuator/health"]
      interval: 10s
      retries: 5
    depends_on:
      ecom-config-service:
        condition: service_healthy

  ecom-inventory-service:
    build: ./inventory-service
    container_name: ecom-inventory-service
    env_file:
      - .env.docker
    networks:
      - ecom-microservices
    ports:
      - "8082:8082"
    expose:
      - "8082"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/actuator/health"]
      interval: 10s
      retries: 5
    depends_on:
      ecom-config-service:
        condition: service_healthy

  ecom-order-service:
    build: ./order-service
    container_name: ecom-order-service
    env_file:
      - .env.docker
    networks:
      - ecom-microservices
    ports:
      - "8083:8083"
    expose:
      - "8083"
    depends_on:
      ecom-customer-service:
        condition: service_healthy
      ecom-inventory-service:
        condition: service_healthy

  ecom-gateway-service:
    build: ./gateway-service
    container_name: ecom-gateway-service
    env_file:
      - .env.docker
    networks:
      - ecom-microservices
    ports:
      - "8888:8888"
    expose:
      - "8888"
    depends_on:
      ecom-config-service:
        condition: service_healthy

  ecom-billing-service:
    build: ./billing-service
    container_name: ecom-billing-service
    env_file:
      - .env.docker
    networks:
      - ecom-microservices
    ports:
      - "8084:8084"
    expose:
      - "8084"
    depends_on:
      ecom-consul:
        condition: service_healthy
      ecom-vault:
        condition: service_healthy